name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o host-local-evict-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: host-local-evict-${{ matrix.goos }}-${{ matrix.goarch }}
